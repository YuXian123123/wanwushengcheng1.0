<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>万物生成器 - 边训练边生成</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #e0e0e0;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        /* 头部 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #4fc3f7;
        }

        .balance {
            display: flex;
            align-items: center;
            gap: 10px;
            background: linear-gradient(135deg, #ffd700 0%, #ffb300 100%);
            color: #1a1a2e;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
        }

        .balance-icon {
            font-size: 20px;
        }

        /* 主内容区 */
        .main-content {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 20px;
        }

        /* 训练状态面板 */
        .training-panel {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
        }

        .panel-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #4fc3f7;
        }

        .status-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .status-label {
            color: #90a4ae;
        }

        .status-value {
            font-weight: bold;
            color: #fff;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            margin: 15px 0;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4fc3f7 0%, #29b6f6 100%);
            border-radius: 4px;
            transition: width 0.3s ease;
        }

        .control-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #4fc3f7 0%, #29b6f6 100%);
            color: #1a1a2e;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #e0e0e0;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        /* 3D 预览区 */
        .preview-section {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .preview-area {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
            min-height: 400px;
        }

        .canvas-container {
            width: 100%;
            height: 350px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #607d8b;
        }

        /* 输入区 */
        .input-section {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
        }

        .input-title {
            font-size: 16px;
            margin-bottom: 15px;
            color: #4fc3f7;
        }

        .input-wrapper {
            display: flex;
            gap: 10px;
        }

        .text-input {
            flex: 1;
            padding: 15px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            font-size: 16px;
            transition: border-color 0.3s ease;
        }

        .text-input:focus {
            outline: none;
            border-color: #4fc3f7;
        }

        .btn-generate {
            padding: 15px 30px;
            background: linear-gradient(135deg, #66bb6a 0%, #43a047 100%);
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .btn-generate:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 187, 106, 0.4);
        }

        /* 历史记录 */
        .history-section {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
        }

        .history-title {
            font-size: 16px;
            margin-bottom: 15px;
            color: #4fc3f7;
        }

        .history-list {
            max-height: 200px;
            overflow-y: auto;
        }

        .history-item {
            display: flex;
            align-items: center;
            padding: 10px;
            margin-bottom: 8px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
        }

        .history-icon {
            margin-right: 10px;
            font-size: 18px;
        }

        .history-text {
            flex: 1;
            color: #b0bec5;
        }

        .history-reward {
            font-weight: bold;
        }

        .reward-positive {
            color: #66bb6a;
        }

        .reward-negative {
            color: #ef5350;
        }

        /* 连接状态 */
        .connection-status {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 12px;
            color: #90a4ae;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ef5350;
        }

        .status-dot.connected {
            background: #66bb6a;
        }

        /* 动画 */
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .training-active .status-value {
            animation: pulse 1s infinite;
            color: #66bb6a;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <div class="header">
            <div class="logo">🎮 万物生成器 - 边训练边生成</div>
            <div class="balance">
                <span class="balance-icon">💰</span>
                <span id="balance">100.00</span>
            </div>
            <div class="connection-status">
                <div class="status-dot" id="status-dot"></div>
                <span id="connection-text">未连接</span>
            </div>
        </div>

        <!-- 主内容 -->
        <div class="main-content">
            <!-- 训练状态面板 -->
            <div class="training-panel">
                <div class="panel-title">📊 训练状态</div>

                <div class="status-item">
                    <span class="status-label">状态</span>
                    <span class="status-value" id="training-status">空闲</span>
                </div>
                <div class="status-item">
                    <span class="status-label">轮次</span>
                    <span class="status-value" id="epoch">0 / 100</span>
                </div>
                <div class="status-item">
                    <span class="status-label">样本</span>
                    <span class="status-value" id="samples">0 / 0</span>
                </div>
                <div class="status-item">
                    <span class="status-label">模板</span>
                    <span class="status-value" id="templates">0</span>
                </div>
                <div class="status-item">
                    <span class="status-label">规则</span>
                    <span class="status-value" id="rules">0</span>
                </div>
                <div class="status-item">
                    <span class="status-label">损失</span>
                    <span class="status-value" id="loss">-</span>
                </div>
                <div class="status-item">
                    <span class="status-label">速度</span>
                    <span class="status-value" id="throughput">- 样本/秒</span>
                </div>

                <div class="progress-bar">
                    <div class="progress-fill" id="progress" style="width: 0%"></div>
                </div>

                <div class="control-buttons">
                    <button class="btn btn-primary" id="btn-start" onclick="startTraining()">▶ 开始</button>
                    <button class="btn btn-secondary" id="btn-pause" onclick="pauseTraining()">⏸ 暂停</button>
                    <button class="btn btn-secondary" id="btn-stop" onclick="stopTraining()">⏹ 停止</button>
                </div>
            </div>

            <!-- 预览区 -->
            <div class="preview-section">
                <div class="preview-area">
                    <div class="panel-title">🎨 3D 预览</div>
                    <div class="canvas-container" id="canvas-container">
                        <div id="scene-info">
                            <p>输入描述生成 3D 场景</p>
                            <p style="font-size: 12px; margin-top: 10px;">成功生成可获得金币奖励</p>
                        </div>
                    </div>
                </div>

                <!-- 输入区 -->
                <div class="input-section">
                    <div class="input-title">💬 输入描述生成 3D 场景</div>
                    <div class="input-wrapper">
                        <input type="text" class="text-input" id="text-input"
                               placeholder="例如：一个房子里有桌子和椅子"
                               onkeypress="if(event.key==='Enter')generate()">
                        <button class="btn-generate" onclick="generate()">🎨 生成场景</button>
                    </div>
                </div>

                <!-- 历史记录 -->
                <div class="history-section">
                    <div class="history-title">📜 生成历史</div>
                    <div class="history-list" id="history-list">
                        <div class="history-item">
                            <span class="history-icon">💡</span>
                            <span class="history-text">等待生成...</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // WebSocket 连接
        let trainingWs = null;
        let generateWs = null;
        let userId = 'user-' + Math.random().toString(36).substr(2, 9);
        let balance = 100.0;

        // 连接 WebSocket
        function connect() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const host = window.location.host;

            // 训练 WebSocket
            trainingWs = new WebSocket(`${protocol}//${host}/ws/training`);
            trainingWs.onopen = () => {
                console.log('训练 WebSocket 已连接');
                updateConnectionStatus(true);
            };
            trainingWs.onmessage = (event) => {
                const data = JSON.parse(event.data);
                handleTrainingStatus(data);
            };
            trainingWs.onclose = () => {
                console.log('训练 WebSocket 已断开');
                updateConnectionStatus(false);
                setTimeout(connect, 3000); // 重连
            };

            // 生成 WebSocket
            generateWs = new WebSocket(`${protocol}//${host}/ws/generate`);
            generateWs.onopen = () => {
                console.log('生成 WebSocket 已连接');
            };
            generateWs.onmessage = (event) => {
                const data = JSON.parse(event.data);
                handleGenerateResponse(data);
            };
            generateWs.onclose = () => {
                console.log('生成 WebSocket 已断开');
            };
        }

        // 更新连接状态
        function updateConnectionStatus(connected) {
            const dot = document.getElementById('status-dot');
            const text = document.getElementById('connection-text');
            if (connected) {
                dot.classList.add('connected');
                text.textContent = '已连接';
            } else {
                dot.classList.remove('connected');
                text.textContent = '未连接';
            }
        }

        // 处理训练状态
        function handleTrainingStatus(data) {
            if (data.type === 'training_status') {
                const state = data.state;

                // 更新状态显示
                document.getElementById('training-status').textContent =
                    state.is_training ? (state.is_paused ? '暂停' : '训练中') : '空闲';
                document.getElementById('epoch').textContent =
                    `${state.epoch} / ${state.total_epochs}`;
                document.getElementById('samples').textContent =
                    `${state.samples_processed} / ${state.total_samples}`;
                document.getElementById('templates').textContent = state.template_count;
                document.getElementById('rules').textContent = state.rule_count;
                document.getElementById('loss').textContent =
                    state.loss.toFixed(4);
                document.getElementById('throughput').textContent =
                    `${state.throughput.toFixed(1)} 样本/秒`;

                // 更新进度条
                const progress = state.total_epochs > 0
                    ? (state.epoch / state.total_epochs * 100)
                    : 0;
                document.getElementById('progress').style.width = `${progress}%`;

                // 更新面板样式
                const panel = document.querySelector('.training-panel');
                if (state.is_training && !state.is_paused) {
                    panel.classList.add('training-active');
                } else {
                    panel.classList.remove('training-active');
                }
            }
        }

        // 处理生成响应
        function handleGenerateResponse(data) {
            console.log('生成响应:', data);

            // 更新余额
            balance = data.coin_change.new_balance;
            document.getElementById('balance').textContent = balance.toFixed(2);

            // 添加历史记录
            addHistoryItem(data);

            // 更新场景预览
            if (data.success && data.scene) {
                updateScenePreview(data.scene);
            }
        }

        // 添加历史记录
        function addHistoryItem(data) {
            const list = document.getElementById('history-list');
            const item = document.createElement('div');
            item.className = 'history-item';

            const icon = data.success ? '✅' : '❌';
            const rewardClass = data.coin_change.amount >= 0 ? 'reward-positive' : 'reward-negative';
            const rewardText = data.coin_change.amount >= 0
                ? `+${data.coin_change.amount.toFixed(1)}`
                : data.coin_change.amount.toFixed(1);

            item.innerHTML = `
                <span class="history-icon">${icon}</span>
                <span class="history-text">${data.scene ? '场景生成成功' : data.error}</span>
                <span class="history-reward ${rewardClass}">${rewardText} 金币</span>
            `;

            list.insertBefore(item, list.firstChild);

            // 保持最多 10 条记录
            while (list.children.length > 10) {
                list.removeChild(list.lastChild);
            }
        }

        // 更新场景预览
        function updateScenePreview(scene) {
            const container = document.getElementById('scene-info');
            const nodeCount = scene.node_count || (scene.nodes ? scene.nodes.length : 0);
            container.innerHTML = `
                <p>✨ 场景生成成功</p>
                <p style="font-size: 14px; margin-top: 10px;">节点数: ${nodeCount}</p>
                <p style="font-size: 12px; color: #66bb6a;">+${nodeCount * 2 + 10} 金币奖励</p>
            `;
        }

        // 开始训练
        function startTraining() {
            if (trainingWs && trainingWs.readyState === WebSocket.OPEN) {
                trainingWs.send(JSON.stringify({
                    "Start": {
                        config: {
                            data_path: "data/training/scenes_combined.json",
                            epochs: 100,
                            batch_size: 32,
                            auto_save: true,
                            save_interval: 60
                        }
                    }
                }));
            }
        }

        // 暂停训练
        function pauseTraining() {
            if (trainingWs && trainingWs.readyState === WebSocket.OPEN) {
                trainingWs.send(JSON.stringify({ "Pause": null }));
            }
        }

        // 停止训练
        function stopTraining() {
            if (trainingWs && trainingWs.readyState === WebSocket.OPEN) {
                trainingWs.send(JSON.stringify({ "Stop": null }));
            }
        }

        // 生成场景
        function generate() {
            const text = document.getElementById('text-input').value.trim();
            if (!text) {
                alert('请输入场景描述');
                return;
            }

            if (generateWs && generateWs.readyState === WebSocket.OPEN) {
                generateWs.send(JSON.stringify({
                    request_id: 'req-' + Date.now(),
                    user_id: userId,
                    text: text
                }));
            }

            document.getElementById('text-input').value = '';
        }

        // 页面加载时连接
        window.onload = connect;
    </script>
</body>
</html>
